<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="ANWI">
  <defs>
    <radialGradient id="m-sphere" cx="32%" cy="28%" r="68%" fx="28%" fy="24%">
      <stop offset="0%" stop-color="#2a3441"/>
      <stop offset="55%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <linearGradient id="m-africa" x1="20" y1="12" x2="46" y2="48" gradientUnits="userSpaceOnUse">
