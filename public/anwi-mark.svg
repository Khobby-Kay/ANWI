    <ellipse cx="32" cy="42" rx="21" ry="5" stroke="#C8A951" stroke-opacity="0.1" stroke-width="0.45" fill="none"/>
    <ellipse cx="32" cy="32" rx="8" ry="25.5" stroke="#C8A951" stroke-opacity="0.18" stroke-width="0.5" fill="none"/>
    <ellipse cx="32" cy="32" rx="16" ry="25.5" stroke="#C8A951" stroke-opacity="0.12" stroke-width="0.45" fill="none"/>
    <ellipse cx="32" cy="32" rx="24" ry="25.5" stroke="#C8A951" stroke-opacity="0.08" stroke-width="0.4" fill="none"/>

